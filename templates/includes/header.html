<!-- ================= HEADER ================= -->
<header class="top-header">
    <div class="header-container">

        <a href="{% url 'home' %}" class="logo">حِلْية</a>

        <nav class="nav-menu" aria-label="القائمة الرئيسية">
            <a href="{% url 'home' %}">الرئيسية</a>
            <a href="/products/">الخواتم</a>
            <a href="/about/">من نحن</a>
            <a href="/contact/">تواصل معنا</a>
        </nav>

        <div class="icons">
            <a href="{% url 'cart:cart' %}" class="cart-btn" aria-label="السلة">
                🛒 السلة
                {% if cart_count %}
                    <span class="cart-count">{{ cart_count }}</span>
                {% endif %}
            </a>

            <span class="user-icon" title="الحساب">👤</span>
        </div>

    </div>
</header>

<!-- ================= HEADER CSS ================= -->
<style>
.top-header {
    background: linear-gradient(135deg, #d4af8f, #c9a060);
    padding: 14px 0;
}

.header-container {
    width: 90%;
    margin: auto;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 20px;
}

.logo {
    font-size: 22px;
    font-weight: 700;
    color: #ffffff;
    letter-spacing: 0.5px;
    text-decoration: none;
    white-space: nowrap;
}

.logo:hover {
    color: #f5efe7;
}

.nav-menu {
    display: flex;
    gap: 25px;
    align-items: center;
}

.nav-menu a {
    text-decoration: none;
    font-size: 14px;
    color: #ffffff;
    font-weight: 500;
    transition: 0.3s;
    white-space: nowrap;
}

.nav-menu a:hover {
    color: #f5efe7;
}

.icons {
    display: flex;
    gap: 15px;
    align-items: center;
}

.cart-btn {
    position: relative;
    padding: 6px 14px;
    border-radius: 30px;
    background: #ffffff;
    color: #8a6a3f;
    font-size: 14px;
    font-weight: 600;
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: 0.3s;
    white-space: nowrap;
}

.cart-btn:hover {
    background: #f5efe7;
}

.cart-count {
    position: absolute;
    top: -6px;
    left: -6px;
    background: #b8860b;
    color: #ffffff;
    font-size: 11px;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 600;
}

.user-icon {
    font-size: 20px;
    color: #ffffff;
    cursor: pointer;
    transition: 0.3s;
}

.user-icon:hover {
    color: #f5efe7;
}

/* ===== نافذة دليل المقاسات ===== */
.size-modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 9999;
}

.size-modal {
    background: #fffaf6;
    width: 90%;
    max-width: 520px;
    border-radius: 20px;
    padding: 30px;
    box-shadow: 0 25px 60px rgba(0,0,0,0.25);
    position: relative;
    animation: fadeUp 0.35s ease;
}

.size-modal-close {
    position: absolute;
    top: 14px;
    left: 18px;
    font-size: 22px;
    cursor: pointer;
    color: #8a6a3f;
}

@keyframes fadeUp {
    from {
        transform: translateY(20px);
        opacity: 0;
    }

    to {
        transform: translateY(0);
        opacity: 1;
    }
}

@media (max-width: 768px) {
    .header-container {
        flex-direction: column;
        align-items: center;
    }

    .nav-menu {
        flex-wrap: wrap;
        justify-content: center;
        gap: 14px;
    }

    .icons {
        justify-content: center;
    }
}
</style>
