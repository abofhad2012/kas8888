<section style="padding:40px 0;">
  <div style="max-width:1200px;margin:auto;">

    <div style="
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
      gap:25px;
    ">

      {% for product in products %}
      <div style="
        background:#fff;
        padding:15px;
        border-radius:14px;
        box-shadow:0 6px 15px rgba(0,0,0,.08);
        text-align:center;
        transition:.3s;
      ">

        {% with product.images.first as img %}
          {% if img %}
            <img
              src="{{ img.image.url }}"
              alt="{{ product.name }}"
              style="
                width:100%;
                height:220px;
                object-fit:cover;
                border-radius:12px;
                margin-bottom:10px;
              ">
          {% endif %}
        {% endwith %}

        <h3 style="margin:10px 0 5px;">
          {{ product.name }}
        </h3>

        <p style="color:#c9a080;font-weight:bold;margin-bottom:12px;">
          {{ product.price }} ر.س
        </p>

        <a href="{% url 'products:product_detail' product.pk %}">
          <button style="
            padding:10px 20px;
            background:#d4af8f;
            border:none;
            border-radius:25px;
            color:#fff;
            cursor:pointer;
            transition:.3s;
          ">
            عرض التفاصيل
          </button>
        </a>

      </div>
      {% empty %}
        <p style="grid-column:1/-1;text-align:center;color:#888;">
          لا توجد منتجات حالياً
        </p>
      {% endfor %}

    </div>
  </div>
</section>
