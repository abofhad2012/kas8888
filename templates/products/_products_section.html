 <section class="home-products">
    <style>
        .home-products {
            padding: 70px 10%;
            background-color: #ffffff;
        }

        .home-products h2 {
            text-align: center;
            color: #8a6a3f;
            margin-bottom: 50px;
            font-size: 30px;
            font-weight: 600;
        }

        .products-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 40px;
        }

        .product-card {
            border: 1px solid #ead9c7;
            border-radius: 16px;
            background: #fff;
            padding: 25px;
            text-align: center;
            max-width: 900px;
            margin: auto;
            transition: 0.35s ease;
        }

        .product-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 18px 40px rgba(0,0,0,0.06);
        }

        .product-card img {
            width: 100%;
            height: 260px;
            object-fit: cover;
            border-radius: 14px;
            margin-bottom: 25px;
        }

        .product-card h4 {
            color: #8a6a3f;
            font-size: 16px;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .product-card p {
            color: #8a6a3f;
            font-size: 15px;
            font-weight: 600;
        }

        /* ====== Details Button ====== */
        .details-btn {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 26px;
            border-radius: 25px;
            background-color: #d4af8f;
            color: white;
            font-size: 14px;
            text-decoration: none;
            transition: 0.3s ease;
        }

        .details-btn:hover {
            background-color: #c9a060;
        }
    </style>

    <h2>أحدث الخواتم</h2>

    <div class="products-grid">
        {% for product in products %}
            <div class="product-card">

                {% with image=product.images.first %}
                    {% if image %}
                        <img src="{{ image.image.url }}" alt="{{ product.name }}">
                    {% endif %}
                {% endwith %}

                <h4>{{ product.name }}</h4>

                <p>
                    {{ product.price }}
                    <span style="font-weight:400;">ر.س</span>
                </p>

                <!-- زر عرض التفاصيل -->
                <a href="{% url 'products:product_detail' product.id %}"
                   class="details-btn">
                    عرض التفاصيل
                </a>

            </div>
        {% empty %}
            <p style="text-align:center;">لا توجد منتجات حاليًا</p>
        {% endfor %}
    </div>
</section>
