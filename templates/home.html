 <!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>المنتجات</title>

    <style>
        .products-grid{
            display:grid;
            grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
            gap:30px;
        }

        .product-card{
            background:#fff;
            border-radius:18px;
            padding:20px;
            text-align:center;
            box-shadow:0 10px 25px rgba(0,0,0,.08);
            transition:.3s;
        }

        .product-card:hover{
            transform:translateY(-6px);
        }

        .product-card img{
            width:100%;
            height:240px;
            object-fit:cover;
            border-radius:14px;
            margin-bottom:15px;
        }

        .product-card h3{
            color:#8a6a3f;
            font-size:18px;
            margin:10px 0;
        }

        .price{
            font-size:20px;
            font-weight:600;
            color:#6b4e2e;
            margin-bottom:15px;
        }

        .btn{
            display:inline-block;
            padding:12px 26px;
            background:#d4af8f;
            color:#fff;
            border-radius:30px;
            text-decoration:none;
            transition:.3s;
        }

        .btn:hover{
            background:#c9a060;
        }

        @media (max-width:768px){
            main{padding:40px 6%;}
        }
    </style>
</head>

<body>

{% include "includes/header.html" %}

<main style="padding:70px 10%;font-family:'Segoe UI',Tahoma;">

    <div class="products-grid">

        {% for product in products %}
        <div class="product-card">

            {% with image=product.images.first %}
                {% if image %}
                    <img src="{{ image.image.url }}" alt="{{ product.name }}">
                {% endif %}
            {% endwith %}

            <h3>{{ product.name }}</h3>

            <div class="price">
                {{ product.price }} ر.س
            </div>

            <!-- ✅ الزر الصحيح -->
            <a href="{% url 'products:product_detail' product.id %}" class="btn">
                عرض التفاصيل
            </a>

        </div>
        {% endfor %}

    </div>

</main>

{% include "includes/footer.html" %}

</body>
</html>
