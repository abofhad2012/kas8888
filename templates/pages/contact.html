{% extends "base.html" %}

{% block title %}تواصل معنا{% endblock %}

{% block content %}
<section class="container py-5">
    <h1>تواصل معنا</h1>
    <p>نسعد بخدمتك والإجابة عن استفساراتك.</p>

    <div class="mb-4">
        <p><strong>الجوال:</strong> +966 5X XXX XXXX</p>
        <p><strong>البريد:</strong> info@kasstore.com</p>
        <p><strong>ساعات العمل:</strong> من السبت إلى الخميس، 9 صباحاً - 9 مساءً</p>
    </div>

    <form method="post">
        {% csrf_token %}

        <div class="mb-3">
            <label for="name">الاسم</label>
            <input id="name" name="name" type="text" required>
        </div>

        <div class="mb-3">
            <label for="email">البريد الإلكتروني</label>
            <input id="email" name="email" type="email" required>
        </div>

        <div class="mb-3">
            <label for="phone">رقم الجوال</label>
            <input id="phone" name="phone" type="tel">
        </div>

        <div class="mb-3">
            <label for="message">الرسالة</label>
            <textarea id="message" name="message" rows="5" required></textarea>
        </div>

        <button type="submit">إرسال</button>
    </form>
</section>
{% endblock %}
